name: salary-fetch

on:
  schedule:
    # 12:00 UTC on the 27th of each month
    - cron: '0 12 27 * *'
  workflow_dispatch:

defaults:
  run:
    working-directory: Salary

concurrency:
  group: salary-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-salary-${{ hashFiles('Salary/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-salary-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run salary optimizer
        env:
          SALARY_R2_PREFIX: ${{ secrets.SALARY_R2_PREFIX }}
          R2_SALARY_PARQUET_KEY: ${{ secrets.R2_SALARY_PARQUET_KEY }}
          R2_SALARY_CSV_KEY: ${{ secrets.R2_SALARY_CSV_KEY }}
          R2_SALARY_FINAL_PARQUET_KEY: ${{ secrets.R2_SALARY_FINAL_PARQUET_KEY }}
          R2_SALARY_FINAL_CSV_KEY: ${{ secrets.R2_SALARY_FINAL_CSV_KEY }}
          R2_CURRENCY_EXCHANGE_CSV_KEY: ${{ secrets.R2_CURRENCY_EXCHANGE_CSV_KEY }}
          SALARY_FX_CURRENCIES: ${{ secrets.SALARY_FX_CURRENCIES }}
          SALARY_FX_API_BASE: ${{ secrets.SALARY_FX_API_BASE }}
          SALARY_HOURS_PER_MONTH: ${{ secrets.SALARY_HOURS_PER_MONTH }}
          SALARY_DAYS_PER_MONTH: ${{ secrets.SALARY_DAYS_PER_MONTH }}
          SALARY_WEEKS_PER_MONTH: ${{ secrets.SALARY_WEEKS_PER_MONTH }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python salary_optimize.py
